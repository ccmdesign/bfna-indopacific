[build]
  # Build command for SSG
  command = "npm run generate"
  # The directory containing the static files to deploy
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"

# Embed routes: allow iframe embedding from any origin via CSP frame-ancestors
# MUST appear BEFORE the /* catch-all rule
[[headers]]
  for = "/embed/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), fullscreen=(self)"

# MarineTraffic embed HTML files: allow being iframed by this site only
[[headers]]
  for = "/embeds/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self'; script-src 'unsafe-inline' https://www.marinetraffic.com"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

# All other routes: deny iframe embedding, allow framing MarineTraffic content
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none'; frame-src 'self' https://www.marinetraffic.com"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), fullscreen=(self)"

[[redirects]]
  # Fallback for SPA-like routing
  from = "/*"
  to = "/index.html"
  status = 200
